<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Тестування: Інфекції з трансмісивним механізмом передачі</title>
    <link rel="icon" href="https://uxwing.com/wp-content/themes/uxwing/download/animals-and-birds/cat-icon.png" type="image/png">
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #f0f2f5;
            color: #1c1e21;
            margin: 0;
            padding: 10px;
            display: flex;
            flex-direction: column; /* ДОДАНО: щоб елементи йшли зверху вниз */
            gap: 20px; /* ДОДАНО: відстань між карткою і прогресом */
            justify-content: center;
            align-items: center; 
            min-height: 100vh;
        }

        /* --- НОВІ СТИЛІ ПРОГРЕСУ --- */
        #progress-wrapper {
            width: 100%;
            max-width: 650px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        #progress-text {
            font-size: 0.95em;
            font-weight: 600;
            color: #555;
            margin-bottom: 8px; /* Відстань від тексту до смуги */
        }

        #progress-container { 
            width: 100%; 
            background-color: #e4e6eb; 
            height: 12px; /* Зробили трохи товщою */
            border-radius: 8px; /* Закруглили кути */
            border: 2px solid #ccc; /* Темна рамочка, як на ескізі */
            overflow: hidden; /* Щоб зелена смуга не вилазила за кути */
        }

        #progress-bar { 
            width: 0%; 
            background-color: #28a745; 
            height: 100%; 
            transition: width 0.3s ease; 
        }

        #quiz-container, #result-container {
            background-color: #ffffff;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 650px;
            min-height: 300px;
            display: flex;
            flex-direction: column;
        }
        #progress-container { width: 100%; background-color: #e4e6eb; height: 8px; }
#progress-bar { width: 0%; background-color: #28a745; height: 100%; transition: width 0.3s ease; }
        
        #quiz-header { padding: 20px; background-color: #007bff; color: white; border-radius: 12px 12px 0 0; }
        #question-counter { font-size: 0.85em; opacity: 0.9; margin-bottom: 4px; }
        #question-text { font-size: 1.15em; font-weight: 600; line-height: 1.4; }

        #options-container { 
            padding: 20px; 
            display: flex; 
            flex-direction: column; 
            gap: 12px;
            flex-grow: 1;
        }

        .option-item {
            display: flex;
            align-items: center;
            border: 2px solid #e4e6eb;
            border-radius: 10px;
            padding: 14px;
            cursor: pointer;
            transition: all 0.1s ease;
            -webkit-tap-highlight-color: transparent;
        }

        .option-item:active { transform: scale(0.98); background-color: #f0f2f5; }
        .option-item.selected { border-color: #007bff; background-color: #e7f3ff; }
        .option-item.correct { border-color: #28a745; background-color: #d4edda; color: #155724; }
        .option-item.incorrect { border-color: #dc3545; background-color: #f8d7da; color: #721c24; }

        .option-item input { width: 20px; height: 20px; margin-right: 15px; flex-shrink: 0; pointer-events: none; }
        .option-item label { flex-grow: 1; cursor: pointer; font-size: 1em; pointer-events: none; }

       #navigation {
            padding: 15px 20px;
            background-color: #f8f9fa;
            border-top: 1px solid #e4e6eb;
            display: flex;
            justify-content: space-between; /* САМЕ ЦЕЙ РЯДОК РОЗКИДАЄ КНОПКИ ПО КРАЯХ */
            align-items: center;
            border-radius: 0 0 12px 12px;
            width: 100%;
            box-sizing: border-box;
        }

       /* Стилі для кнопки "Почати знову" (червона) */
        .restart-btn {
            background-color: #dc3545 !important; /* Додано !important */
        }
        
        /* Стилі для кнопки "Перемішати" (жовто-помаранчева) */
        .shuffle-btn {
            background-color: #ffc107 !important;
            color: #212529 !important;
        }
        .shuffle-btn:hover { 
            background-color: #e0a800 !important; 
        }

        /* Щоб ліві кнопки стояли поруч */
        .left-buttons {
            display: flex;
            gap: 10px;
        }
        .restart-btn:hover { 
            background-color: #c82333 !important; /* Додано !important */
        }

        .nav-button {
            padding: 12px 24px;
            border-radius: 8px;
            border: none;
            font-weight: 600;
            cursor: pointer;
            background-color: #007bff;
            color: white;
            transition: background-color 0.2s;
        }

        .nav-button:hover { background-color: #0056b3; }
        .nav-button:disabled { background-color: #bcc0c4; cursor: not-allowed; }
        #feedback-container { padding: 10px 20px; text-align: center; font-weight: bold; display: none; }
        .res-correct { color: #28a745; }
        .res-wrong { color: #dc3545; }
        .result-item { padding: 15px; border-bottom: 1px solid #eee; }
        #result-container { display: none; padding: 20px; max-height: 90vh; overflow-y: auto; }
    </style>
</head>
<body>

    <div id="quiz-container">
  
        <div id="quiz-header">
            <div id="question-counter"></div>
            <div id="question-text"></div>
        </div>
        <div id="options-container"></div>
        <div id="feedback-container"></div>
        <div id="navigation">
            <!-- Групируем левые кнопки -->
            <div class="left-buttons">
                <button class="nav-button restart-btn" onclick="confirmRestart()">Почати знову</button>
                <button class="nav-button shuffle-btn" onclick="confirmShuffle()">Перемішати</button>
            </div>
            
            <!-- Кнопка справа -->
            <button class="nav-button" id="main-btn" onclick="handleButtonClick()" disabled>Перевірити</button>
        </div>
            </div>
    <!-- НОВИЙ БЛОК ПРОГРЕСУ (Під карткою квізу) -->
    <div id="progress-wrapper">
        <div id="progress-text">0%</div>
        <div id="progress-container">
            <div id="progress-bar"></div>
        </div>
    </div>

    <div id="result-container">
        <h2>Результат</h2>
        <div id="score-text"></div>
        <div id="error-review"></div>
        <button class="nav-button" onclick="restartQuiz()" style="width:100%; margin-top:20px;">Почати знову</button>
    </div>

    <script>
                      
    let quizData = [ 
    { 
        question: "1. Жінка 65-ти років хвора на хронічне обструктивне захворювання легень із загостреннями хвороби щонайменше двічі на рік. Останнє загострення з підвищенням температури та гнійним харкотинням було проліковане 3 тижні тому. Яка тактика ведення хворої щодо вторинної імунопрофілактики загострень та прогресування дихальної недостатності?",

            a: "Призначення гомологічного імуноглобуліну",

    { 
        question: "9. Жінка 58-ми років з нейросенсорною глухотою внаслідок ускладнення після перенесеного гнійного менінгіту планує встановлення кохлеарного імплантату. Щеплення проти якої інфекції необхідно зробити для попередження інфекційних захворювань центральної нервової системи і органів слуху?", 
        options: { 
            a: "Гемофільної інфекції", 
            b: "Пневмококової інфекції",

            d: "Вірусу кліщового енцефаліту",

        options: { 
            a: "Кишковий амебіаз",

        let currentQ = 0;
        let score = 0;
        let errors = [];
        let isAnswered = false;
        let userSelect =[];

        // --- ФУНКЦИИ СОХРАНЕНИЯ ---
        
        // ЗАВАНТАЖЕННЯ ПЕРЕМІШАНОГО МАСИВУ (якщо він є)
        const savedShuffled = localStorage.getItem('quiz_shuffled_data');
        if (savedShuffled) {
            quizData = JSON.parse(savedShuffled);
        }
        
        function saveProgress() {
            localStorage.setItem('quiz_currentQ', currentQ);
            localStorage.setItem('quiz_score', score);
            localStorage.setItem('quiz_errors', JSON.stringify(errors));
        }

        function loadProgress() {
            const savedQ = localStorage.getItem('quiz_currentQ');
            const savedScore = localStorage.getItem('quiz_score');
            const savedErrors = localStorage.getItem('quiz_errors');
            
            if (savedQ !== null) {
                currentQ = parseInt(savedQ);
                score = parseInt(savedScore);
                if (savedErrors) errors = JSON.parse(savedErrors);
                
                // Если тест был пройден до конца ранее, сбросим
                if (currentQ >= quizData.length) clearProgress();
            }
        }

        function clearProgress() {
            localStorage.removeItem('quiz_currentQ');
            localStorage.removeItem('quiz_score');
            localStorage.removeItem('quiz_errors');
        }

        // --- ОСНОВНЫЕ ФУНКЦИИ ---
        function loadQ() {
            isAnswered = false;
            userSelect =[];
            document.getElementById('feedback-container').style.display = 'none';
            document.getElementById('main-btn').innerText = "Перевірити";
            document.getElementById('main-btn').disabled = true;
            
            // Обновление полоски прогресса
            // Оновлення смуги прогресу та тексту над нею
            const progress = (currentQ / quizData.length) * 100;
            const MathProgress = Math.round(progress); // Округлюємо до цілого числа
            
            document.getElementById('progress-bar').style.width = progress + '%';
            document.getElementById('progress-text').innerText = `${MathProgress}%`; 
            // Якщо хочете, щоб писало ще й номер питання, можна зробити так:
            // document.getElementById('progress-text').innerText = `${MathProgress}% (${currentQ} / ${quizData.length})`;

            const q = quizData[currentQ];
            document.getElementById('question-counter').innerText = `Питання ${currentQ + 1} з ${quizData.length}`;
            document.getElementById('question-text').innerText = q.question;
            
            const container = document.getElementById('options-container');
            container.innerHTML = '';
            
            const type = q.correct.length > 1 ? 'checkbox' : 'radio';
            
            for (let key in q.options) {
                const item = document.createElement('div');
                item.className = 'option-item';
                item.innerHTML = `
                    <input type="${type}" id="${key}" name="opt">
                    <label>${key}) ${q.options[key]}</label>
                `;
                item.onclick = () => selectOpt(item, key, type);
                container.appendChild(item);
            }
        }   

        function selectOpt(item, key, type) {
            if (isAnswered) return;
            if (type === 'radio') {
                userSelect = [key];
                document.querySelectorAll('.option-item').forEach(el => el.classList.remove('selected'));
                item.classList.add('selected');
                document.querySelectorAll('input').forEach(i => i.checked = false);
                item.querySelector('input').checked = true;
            } else {
                if (userSelect.includes(key)) {
                    userSelect = userSelect.filter(k => k !== key);
                    item.classList.remove('selected');
                    item.querySelector('input').checked = false;
                } else {
                    userSelect.push(key);
                    item.classList.add('selected');
                    item.querySelector('input').checked = true;
                }
            }
            document.getElementById('main-btn').disabled = userSelect.length === 0;
        }

        function handleButtonClick() {
            if (!isAnswered) check();
            else next();
        }

        function check() {
            isAnswered = true;
            const q = quizData[currentQ];
            const isCorrect = userSelect.sort().join() === q.correct.sort().join();
            
            const feedback = document.getElementById('feedback-container');
            feedback.style.display = 'block';
            
            if (isCorrect) {
                score++;
                feedback.innerHTML = '<span class="res-correct">Правильно!</span>';
            } else {
                feedback.innerHTML = '<span class="res-wrong">Неправильно.</span>';
                errors.push({
                    q: q.question,
                    user: userSelect.map(k => `${k}) ${q.options[k]}`).join(', '),
                    correct: q.correct.map(k => `${k}) ${q.options[k]}`).join(', ')
                });
            }
            
            document.querySelectorAll('.option-item').forEach(el => {
                const val = el.querySelector('input').id;
                if (q.correct.includes(val)) el.classList.add('correct');
                else if (userSelect.includes(val)) el.classList.add('incorrect');
            });
            
            document.getElementById('main-btn').innerText = (currentQ < quizData.length - 1) ? "Наступне" : "Завершити";
            saveProgress(); 
        }

        function next() {
            currentQ++;
            if (currentQ < quizData.length) {
                saveProgress(); 
                loadQ();
            } else {
                showResult();
            }
        }

        function showResult() {
            document.getElementById('quiz-container').style.display = 'none';
            document.getElementById('result-container').style.display = 'block';
            document.getElementById('progress-wrapper').style.display = 'none';
            document.getElementById('score-text').innerHTML = `<h3>Ваш рахунок: ${score} з ${quizData.length}</h3>`;
            
            
            const review = document.getElementById('error-review');
            if (errors.length > 0) {
                review.innerHTML = '<h4>Огляд помилок:</h4>';
                errors.forEach(err => {
                    review.innerHTML += `
                        <div class="result-item">
                            <p><strong>${err.q}</strong></p>
                            <p class="res-wrong">Ви: ${err.user || 'нічого'}</p>
                            <p class="res-correct">Правильно: ${err.correct}</p>
                        </div>
                    `;
                });
            }
        }

        // Загрузка при старте
        loadProgress();
        
        // Если дошли до финала, показываем результат, иначе — текущий вопрос
        if (currentQ >= quizData.length && quizData.length > 0) {
            showResult();
        } else {
            loadQ();
        }
// Нова функція з підтвердженням
        function confirmRestart() {
            if (confirm("ви впевнені? йоу")) {
                restartQuiz();
            }
        }

        // Функція для кнопки "Почати знову" (вона у вас вже є)
       function restartQuiz() {
            clearProgress();
            localStorage.removeItem('quiz_shuffled_data'); // Видаляємо перемішаний порядок
            location.reload();
        
                }
                
                
         // --- НОВІ ФУНКЦІЇ ДЛЯ ПЕРЕМІШУВАННЯ ---
        function confirmShuffle() {
            if (confirm("Ви впевнені? Прогрес буде скинуто, а питання перемішані у випадковому порядку!")) {
                shuffleQuiz();
            }
        }

        function shuffleQuiz() {
            // Алгоритм Фішера-Єйтса для перемішування масиву
            for (let i = quizData.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [quizData[i], quizData[j]] = [quizData[j], quizData[i]];
            }
            
            // Зберігаємо перемішаний масив, щоб при оновленні сторінки порядок не збився
            localStorage.setItem('quiz_shuffled_data', JSON.stringify(quizData));
            
            // Скидаємо прогрес
            clearProgress();
            currentQ = 0;
            score = 0;
            errors = [];
            isAnswered = false;
            
            // Якщо ми були на екрані результатів, повертаємо інтерфейс квізу
            document.getElementById('result-container').style.display = 'none';
            document.getElementById('quiz-container').style.display = 'flex';
            document.getElementById('progress-wrapper').style.display = 'flex';
            
            // Завантажуємо перше питання
            loadQ();
        }
     
    </script>
